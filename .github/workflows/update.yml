
name: Update Master Playlist

on:
  workflow_dispatch:
  schedule:
    - cron: '0 */2 * * *'

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repo
        uses: actions/checkout@v4

      - name: Ensure build folder exists
        run: |
          mkdir -p build
          touch build/.gitkeep
          git add build/.gitkeep
          git commit -m "Ensure build folder exists" || echo "No changes"
          git push || echo "Push skipped"

      - name: Create sources folder
        run: mkdir -p sources

      - name: Download playlists (sources hidden)
        env:
          SRC_JTV:     ${{ secrets.SRC_JTV }}
          SRC_LGTV:    ${{ secrets.SRC_LGTV }}
          SRC_ZEE5:    ${{ secrets.SRC_ZEE5 }}
          SRC_JTVBACK: ${{ secrets.SRC_JTVBACK }}
          SRC_TATA_TV: ${{ secrets.SRC_TATA_TV }}
          SRC_SONY:    ${{ secrets.SRC_SONY }}
        run: |
          wget -q -O sources/jtv.m3u      "$SRC_JTV"     || echo "JTV failed"
          wget -q -O sources/lgtv.m3u     "$SRC_LGTV"    || echo "LGTV failed"
          wget -q -O sources/zee5.m3u     "$SRC_ZEE5"    || echo "ZEE5 failed"
          wget -q -O sources/jtvback.m3u  "$SRC_JTVBACK" || echo "JTVBACK failed"
          wget -q -O sources/tata_tv.m3u  "$SRC_TATA_TV" || echo "TATA failed"
          wget -q -O sources/sony.m3u     "$SRC_SONY"    || echo "SONY failed"

      - name: Build master playlist
        run: |
          mkdir -p build
          echo "#EXTM3U" > build/liveent.tmp

          # ---------- STATIC ----------
          if [ -s staticf/static.m3u ]; then
            sed '1d' staticf/static.m3u >> build/liveent.tmp
          fi

          # ---------- SOURCES ----------
          for f in sources/*.m3u; do
            [ -s "$f" ] && sed '1d' "$f" >> build/liveent.tmp
          done

          # ---------- FILTER LANGUAGE ----------
          awk '
            /^#EXTINF/ {
              name = $0
              sub(/.*?,/, "", name)

              if (tolower(name) ~ /(telugu|tamil)/) {
                skip = 1
              } else {
                skip = 0
                print
              }
              next
            }
            !skip { print }
          ' build/liveent.tmp > build/liveent.filtered

          mv build/liveent.filtered build/liveent.tmp

          # ---------- DEDUP ----------
          awk '
            /^#EXTINF/ {
              name = $0
              sub(/.*?,/, "", name)

              key = tolower(name)
              gsub(/^[ \t]+|[ \t]+$/, "", key)

              if (!(key in seen)) {
                seen[key] = 1
                keep = 1
                print
              } else {
                keep = 0
              }
              next
            }
            keep { print }
          ' build/liveent.tmp > build/liveent.xyn


      - name: Match with VortexVision & apply categories
        run: |
          wget -q -O vortex.m3u https://raw.githubusercontent.com/Prithvirajdt/LiveTv/refs/heads/main/build/VortexVision.xyn

          # Build map
          awk '
            BEGIN { FS="," }
            /^#EXTINF/ {
              line=$0

              name=line
              sub(/.*?,/, "", name)
              gsub(/^[ \t]+|[ \t]+$/, "", name)
              key=tolower(name)

              group=""
              if (match(line, /group-title="[^"]+"/)) {
                group=substr(line, RSTART+13, RLENGTH-14)
              }

              map[key]=group
            }

            END {
              for (k in map) {
                print k "|" map[k]
              }
            }
          ' vortex.m3u > map.txt

          # Filter + replace group
          awk -F'|' '
            NR==FNR {
              map[$1]=$2
              next
            }

            /^#EXTINF/ {
              line=$0

              name=line
              sub(/.*?,/, "", name)
              gsub(/^[ \t]+|[ \t]+$/, "", name)
              key=tolower(name)

              if (key in map) {
                grp=map[key]

                gsub(/group-title="[^"]*"/, "", line)
                sub(/#EXTINF:-1/, "#EXTINF:-1 group-title=\"" grp "\"", line)

                print line
                keep=1
              } else {
                keep=0
              }
              next
            }

            keep { print }

          ' map.txt build/liveent.xyn > build/liveent.final

          mv build/liveent.final build/liveent.xyn


      - name: Clean playlist
        run: |
          sed -i '/githubusercontent.com/d' build/liveent.xyn
          sed -i '/raw.githubusercontent.com/d' build/liveent.xyn

      - name: Commit and push playlist
        run: |
          git config user.name "github-actions"
          git config user.email "github-actions@github.com"

          git add build/liveent.xyn
          git diff-index --quiet HEAD || git commit -m "Auto update liveent playlist"
          git push || echo "No changes to push"
```
