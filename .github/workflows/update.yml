name: Update Master Playlist

# --------------------------------------------------
# WHEN THIS WORKFLOW RUNS
# --------------------------------------------------
# 1. Manually (workflow_dispatch)
# 2. Automatically every 6 hours
# --------------------------------------------------
on:
  workflow_dispatch:
  schedule:
    - cron: '0 */2 * * *'

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      # --------------------------------------------------
      # STEP 1: CHECKOUT REPOSITORY
      # --------------------------------------------------
      - name: Checkout repo
        uses: actions/checkout@v4

      # --------------------------------------------------
      # STEP 2: ENSURE build/ DIRECTORY EXISTS
      # - Required so Git tracks the folder
      # - .gitkeep avoids empty-folder issues
      # --------------------------------------------------
      - name: Ensure build folder exists
        run: |
          mkdir -p build
          touch build/.gitkeep
          git add build/.gitkeep
          git commit -m "Ensure build folder exists" || echo "No changes"
          git push || echo "Push skipped"

      # --------------------------------------------------
      # STEP 3: CREATE TEMP SOURCES FOLDER
      # - Holds downloaded playlists
      # --------------------------------------------------
      - name: Create sources folder
        run: |
          mkdir -p sources

      # --------------------------------------------------
      # STEP 4: DOWNLOAD ALL SOURCE PLAYLISTS
      # - URLs are stored securely in GitHub Secrets
      # - Nothing sensitive is exposed in code
      # --------------------------------------------------
      - name: Download playlists (sources hidden)
        env:
          SRC_JTV:     ${{ secrets.SRC_JTV }}
          SRC_LGTV:    ${{ secrets.SRC_LGTV }}
          SRC_ZEE5:    ${{ secrets.SRC_ZEE5 }}
          SRC_JTVBACK: ${{ secrets.SRC_JTVBACK }}
          SRC_TATA_TV: ${{ secrets.SRC_TATA_TV }}
          SRC_SONY:    ${{ secrets.SRC_SONY }}
        run: |
          wget -q -O sources/jtv.m3u      "$SRC_JTV"
          wget -q -O sources/lgtv.m3u     "$SRC_LGTV"
          wget -q -O sources/zee5.m3u     "$SRC_ZEE5"
          wget -q -O sources/jtvback.m3u  "$SRC_JTVBACK"
          wget -q -O sources/tata_tv.m3u  "$SRC_TATA_TV"
          wget -q -O sources/sony.m3u     "$SRC_SONY"

      # --------------------------------------------------
      # STEP 5: BUILD MASTER PLAYLIST
      # --------------------------------------------------
      - name: Build master playlist
        run: |
          mkdir -p build

          # Create temp playlist and write M3U header
          echo "#EXTM3U" > build/VortexVision.tmp

          # --------------------------------------------------
          # STATIC PLAYLIST (ALWAYS FIRST)
          # --------------------------------------------------
          if [ -f static/my_static.m3u ]; then
            sed '1d' static/my_static.m3u >> build/VortexVision.tmp
          fi

          # ==================================================
          # JIOTV
          # ==================================================
          if [ -f sources/jtv.m3u ]; then
            sed '1d' sources/jtv.m3u >> build/VortexVision.tmp
          fi

          # ==================================================
          # LGTV
          # ==================================================
          if [ -f sources/lgtv.m3u ]; then
            sed '1d' sources/lgtv.m3u >> build/VortexVision.tmp
          fi

           # --------------------------------------------------
          # ZEE5
          # --------------------------------------------------
          if [ -f sources/zee5.m3u ]; then
            sed '1d' sources/zee5.m3u >> build/VortexVision.tmp
          fi

          # --------------------------------------------------
          # SONY
          # --------------------------------------------------
          if [ -f sources/sony.m3u ]; then
            sed '1d' sources/sony.m3u >> build/VortexVision.tmp
          fi

          # ==================================================
          # JIOTVBACK
          # ==================================================
          if [ -f sources/jtvback.m3u ]; then
            sed '1d' sources/jtvback.m3u >> build/VortexVision.tmp
          fi

          # --------------------------------------------------
          # TATA TV: KEEP KIDS CHANNELS ONLY
          # --------------------------------------------------
          if [ -f sources/tata_tv.m3u ]; then
            sed '1d' sources/tata_tv.m3u >> build/VortexVision.tmp
          fi

          # --------------------------------------------------
          # REMOVE CHANNELS BY NAME (CASE-INSENSITIVE)
          # --------------------------------------------------
          awk '
            /^#EXTINF/ {
              name = $0
              sub(/.*?,/, "", name)

              if (tolower(name) ~ /(telugu|tamil)/) {
                skip = 1
              } else {
                skip = 0
                print
              }
              next
            }
            !skip { print }
          ' build/VortexVision.tmp > build/VortexVision.filtered

          mv build/VortexVision.filtered build/VortexVision.tmp

          # --------------------------------------------------
          # DEDUPLICATION (BY CHANNEL NAME, FIRST WINS)
          # --------------------------------------------------
          awk '
            /^#EXTINF/ {
              name = $0
              sub(/.*?,/, "", name)

              if (!(name in seen)) {
                seen[name] = 1
                keep = 1
                print
              } else {
                keep = 0
              }
              next
            }
            keep { print }
          ' build/VortexVision.tmp > build/liveent.xyn

          # --------------------------------------------------
          # SAFETY CLEANUP (BLOCK RAW GITHUB LINKS)
          # --------------------------------------------------
          sed -i '/githubusercontent.com/d' build/liveent.xyn
          sed -i '/raw.githubusercontent.com/d' build/liveent.xyn

      # --------------------------------------------------
      # STEP 6: COMMIT & PUSH FINAL PLAYLIST
      # --------------------------------------------------
      - name: Commit and push playlist
        run: |
          git config user.name "github-actions"
          git config user.email "github-actions@github.com"

          git add build/liveent.xyn
          git diff-index --quiet HEAD || git commit -m "Auto update VortexVision playlist"
          git push || echo "No changes to push"
