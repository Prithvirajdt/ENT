name: Build Live Playlist

on:
  workflow_dispatch:
  schedule:
    - cron: '0 */5 * * *'


jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      # ------------------------------
      # CHECKOUT
      # ------------------------------
      - uses: actions/checkout@v4

      # ------------------------------
      # FOLDERS
      # ------------------------------
      - run: mkdir -p build sources

      # ------------------------------
      # DOWNLOAD SOURCE
      # ------------------------------
      - name: Download 24x7 source
        env:
          SRC_24X7: ${{ secrets.SRC_24X7 }}
        run: |
          wget -O sources/24x7.m3u "$SRC_24X7" || echo "Download failed"

      # ------------------------------
      # CHANNEL LIST (EDIT THIS ONLY)
      # ------------------------------
      - name: Set channels
        run: |
          printf "ben 10\nblack clover\ndemon slayer\nfamily guy\nthe simpsons\nbattlebots\nslime\n" > channels.txt

      # ------------------------------
      # BUILD (SMART MATCH + FORCE LIVE)
      # ------------------------------
      - name: Build playlist
        run: |
          echo "#EXTM3U" > build/live.m3u

          awk '
          NR==FNR {
            key[tolower($0)] = 1
            next
          }

          /^#EXTINF/ {
            line = $0
            lower = tolower($0)

            keep = 0
            for (k in key) {
              if (index(lower, k)) {
                keep = 1
                break
              }
            }

            if (keep) {
              # Force category to Live
              gsub(/group-title="[^"]*"/, "group-title=\"Live\"", line)
              print line
            }
            next
          }

          keep { print }

          ' channels.txt sources/24x7.m3u >> build/live.m3u

      # ------------------------------
      # PUSH
      # ------------------------------
      - name: Push
        run: |
          git config user.name "bot"
          git config user.email "bot@github.com"

          git add build/live.m3u
          git commit -m "update live playlist" || echo "no changes"
          git push
