name: Build Live Playlist

on:
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      # ------------------------------
      # CHECKOUT
      # ------------------------------
      - uses: actions/checkout@v4

      # ------------------------------
      # FOLDERS
      # ------------------------------
      - run: mkdir -p build sources

      # ------------------------------
      # DOWNLOAD SOURCE
      # ------------------------------
      - name: Download 24x7 source
        env:
          SRC_24X7: ${{ secrets.SRC_24X7 }}
        run: |
          wget -O sources/24x7.m3u "$SRC_24X7" || echo "Download failed"

      # ------------------------------
      # CHANNEL LIST (EDIT THIS ONLY)
      # ------------------------------
      - name: Set channels
        run: |
          echo -e "ben 10\black clover\demon slayer\dragon ball\slime" > channels.txt

      # ------------------------------
      # BUILD (EXACT MATCH + FORCE LIVE)
      # ------------------------------
      - name: Build playlist
        run: |
          echo "#EXTM3U" > build/live.m3u

          awk '
          NR==FNR {
            key[tolower($0)] = 1
            next
          }

          /^#EXTINF/ {
            line = $0
            name = line
            sub(/.*?,/, "", name)

            keyname = tolower(name)
            gsub(/^[ \t]+|[ \t]+$/, "", keyname)

            if (keyname in key) {
              keep = 1

              # Force category
              gsub(/group-title="[^"]*"/, "group-title=\"Live\"", line)

              print line
            } else {
              keep = 0
            }
            next
          }

          keep { print }

          ' channels.txt sources/24x7.m3u >> build/live.m3u

      # ------------------------------
      # PUSH
      # ------------------------------
      - name: Push
        run: |
          git config user.name "bot"
          git config user.email "bot@github.com"

          git add build/live.m3u
          git commit -m "update live playlist" || echo "no changes"
          git push
