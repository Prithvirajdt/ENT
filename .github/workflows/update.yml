name: Update Master Playlist

on:
  workflow_dispatch:
  schedule:
    - cron: '0 */2 * * *'

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repo
        uses: actions/checkout@v4

      - name: Create folders
        run: |
          mkdir -p build sources

      - name: Download sources
        env:
          SRC_JTV:     ${{ secrets.SRC_JTV }}
          SRC_LGTV:    ${{ secrets.SRC_LGTV }}
          SRC_ZEE5:    ${{ secrets.SRC_ZEE5 }}
          SRC_JTVBACK: ${{ secrets.SRC_JTVBACK }}
          SRC_TATA_TV: ${{ secrets.SRC_TATA_TV }}
          SRC_SONY:    ${{ secrets.SRC_SONY }}
        run: |
          wget -q -O sources/jtv.m3u      "$SRC_JTV"     || true
          wget -q -O sources/lgtv.m3u     "$SRC_LGTV"    || true
          wget -q -O sources/zee5.m3u     "$SRC_ZEE5"    || true
          wget -q -O sources/jtvback.m3u  "$SRC_JTVBACK" || true
          wget -q -O sources/tata_tv.m3u  "$SRC_TATA_TV" || true
          wget -q -O sources/sony.m3u     "$SRC_SONY"    || true

      - name: Build base playlist
        run: |
          echo "#EXTM3U" > build/liveent.tmp

          # static
          [ -s staticf/static.m3u ] && sed '1d' staticf/static.m3u >> build/liveent.tmp

          # sources
          for f in sources/*.m3u; do
            [ -s "$f" ] && sed '1d' "$f" >> build/liveent.tmp
          done

      - name: Filter + Dedup
        run: |
          awk '
          BEGIN { IGNORECASE=1 }

          /^#EXTINF/ {
            name=$0
            sub(/.*?,/, "", name)

            if (name ~ /(telugu|tamil)/) {
              skip=1
            } else {
              skip=0
              key=tolower(name)
              gsub(/^[ \t]+|[ \t]+$/, "", key)

              if (!(key in seen)) {
                seen[key]=1
                keep=1
                print
              } else {
                keep=0
              }
            }
            next
          }

          keep { print }

          ' build/liveent.tmp > build/liveent.xyn

      - name: Match with VortexVision
        run: |
          wget -q -O vortex.m3u https://raw.githubusercontent.com/Prithvirajdt/Live-Tv/refs/heads/main/build/VortexVision.xyn

          # create map
          awk '
          /^#EXTINF/ {
            line=$0

            name=line
            sub(/.*?,/, "", name)
            key=tolower(name)
            gsub(/^[ \t]+|[ \t]+$/, "", key)

            group=""
            if (match(line, /group-title="[^"]+"/)) {
              group=substr(line, RSTART+13, RLENGTH-14)
            }

            map[key]=group
          }

          END {
            for (k in map) print k "|" map[k]
          }
          ' vortex.m3u > map.txt

          # filter + replace
          awk -F'|' '
          NR==FNR {
            map[$1]=$2
            next
          }

          /^#EXTINF/ {
            line=$0

            name=line
            sub(/.*?,/, "", name)
            key=tolower(name)
            gsub(/^[ \t]+|[ \t]+$/, "", key)

            if (key in map) {
              grp=map[key]

              gsub(/group-title="[^"]*"/, "", line)
              sub(/#EXTINF:-1/, "#EXTINF:-1 group-title=\"" grp "\"", line)

              print line
              keep=1
            } else {
              keep=0
            }
            next
          }

          keep { print }

          ' map.txt build/liveent.xyn > build/final.m3u

          mv build/final.m3u build/liveent.xyn

      - name: Clean
        run: |
          sed -i '/githubusercontent.com/d' build/liveent.xyn
          sed -i '/raw.githubusercontent.com/d' build/liveent.xyn

      - name: Commit
        run: |
          git config user.name "github-actions"
          git config user.email "github-actions@github.com"

          git add build/liveent.xyn
          git commit -m "update playlist" || echo "no changes"
          git push
