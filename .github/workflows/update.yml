name: Build Live Playlist

on:
  workflow_dispatch:
  schedule:
    - cron: '0 */5 * * *'

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      # ------------------------------
      # CHECKOUT
      # ------------------------------
      - uses: actions/checkout@v4

      # ------------------------------
      # FOLDERS
      # ------------------------------
      - run: mkdir -p build sources

      # ------------------------------
      # DOWNLOAD SOURCE
      # ------------------------------
      - name: Download 24x7 source
        env:
          SRC_24X7: ${{ secrets.SRC_24X7 }}
        run: |
          if [ -z "$SRC_24X7" ]; then
            echo "Missing SRC_24X7 secret"
            exit 1
          fi

          wget -q -O sources/24x7.m3u "$SRC_24X7"

          if [ ! -s sources/24x7.m3u ]; then
            echo "Download failed or empty file"
            exit 1
          fi

      # ------------------------------
      # CHANNEL LIST
      # ------------------------------
      - name: Set channels
        run: |
          printf "ben 10\nblack clover\ndemon slayer\nfamily guy\nthe simpsons\nbattlebots\nthe rookie\ngame of thrones\nsuits\nultimate spider\navengers assemble\nslime\n" > channels.txt

      # ------------------------------
      # BUILD (CLEAN NAME + MATCH)
      # ------------------------------
      - name: Build playlist
        run: |
          echo "#EXTM3U" > build/live.m3u

          awk '
          function clean_name(n) {
            n = tolower(n)

            # remove 24x7 / 24/7 / 24*7
            gsub(/24[\/x\*]7/, "", n)

            # remove extra spaces
            gsub(/^ +| +$/, "", n)
            gsub(/  +/, " ", n)

            return n
          }

          NR==FNR {
            key[clean_name($0)] = 1
            next
          }

          /^#EXTINF/ {
            original = $0

            # extract name
            split($0, parts, ",")
            raw_name = parts[length(parts)]

            name = clean_name(raw_name)

            keep = 0
            for (k in key) {
              if (index(name, k)) {
                keep = 1
                break
              }
            }

            if (keep) {
              line = original

              # force Live group
              gsub(/group-title="[^"]*"/, "group-title=\"Live\"", line)

              # replace with cleaned name
              sub(/,[^,]*$/, "," raw_name, line)   # reset
              sub(/,[^,]*$/, "," name, line)       # apply clean name

              print line
            }
            next
          }

          {
            if (keep) print
          }

          ' channels.txt sources/24x7.m3u >> build/live.m3u

      # ------------------------------
      # PUSH
      # ------------------------------
      - name: Push
        run: |
          git config user.name "bot"
          git config user.email "bot@github.com"

          git add build/live.m3u
          git commit -m "update live playlist" || echo "no changes"
          git push
